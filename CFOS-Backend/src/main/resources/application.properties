spring.application.name=canteen
# ===================================================================
# DATABASE CONNECTION CONFIGURATION (MySQL)
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/CFOSDB?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# JPA / HIBERNATE CONFIGURATION
# ===================================================================
# 'validate' ensures your Java entities match the existing DB tables exactly.
# Change to 'update' if you want Hibernate to automatically create/modify tables.
spring.jpa.hibernate.ddl-auto=update

# Specifies MySQL 8+ features (ideal for modern MySQL instances)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Set to true to view SQL queries in your console output (great for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# LOGGING CONFIGURATION
# ===================================================================

# Set the root logging level for the entire application (INFO is default and clean)
logging.level.root=INFO

# Show detailed logs for your own application code (replace with your actual base package)
logging.level.com.example.cfos=DEBUG

# --- Hibernate & SQL Logging ---
# Log all SQL DML statements as they are executed
logging.level.org.hibernate.SQL=DEBUG

# Log the actual values bound to the SQL parameters (bind parameters)
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Optional: Log schema generation or validation issues specifically
logging.level.org.hibernate.tool.schema=DEBUG

server.port=8081

# ===================================================================
# JWT CONFIGURATION
# ===================================================================
